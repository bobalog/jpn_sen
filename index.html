<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일본어 문장 카드 배치 연습장</title>
  <style>
    :root {
      --bg1: #fff7fb;
      --bg2: #fff0f6;
      --pink1: #ffd6e7;
      --pink2: #ff9fc8;
      --pink3: #ff6fae;
      --pink4: #e84d95;
      --text: #5b3550;
      --white: #ffffff;
      --mint: #eafff3;
      --mint-b: #63c98d;
      --rose: #fff1f4;
      --rose-b: #ff8aa8;
      --shadow: 0 10px 30px rgba(255, 111, 174, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Arial", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero {
      background: rgba(255,255,255,0.9);
      border: 2px solid var(--pink1);
      border-radius: 30px;
      padding: 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    h1 { margin: 0 0 8px; color: var(--pink4); font-size: 28px; }
    .sub { margin: 0; line-height: 1.6; font-size: 15px; }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
      justify-content: center;
    }

    .tab-btn {
      border: none;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 700;
      background: var(--white);
      border: 2px solid var(--pink1);
      border-radius: 999px;
      padding: 8px 16px;
      color: var(--pink4);
    }

    .tab-btn.active {
      background: var(--pink3);
      color: white;
      border-color: var(--pink3);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.5fr 0.9fr;
      gap: 18px;
      margin-top: 18px;
    }

    .card {
      background: rgba(255,255,255,0.94);
      border: 2px solid var(--pink1);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .meaning-box {
      background: linear-gradient(90deg, #fff5fa, #fff7fd);
      border: 2px solid #ffd9e8;
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .meaning-text { font-size: 22px; font-weight: 800; }

    .answer-box, .bank-box {
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 14px;
      min-height: 100px;
    }

    .answer-box { background: #fffafb; border: 2px dashed var(--pink2); }
    .bank-box { background: #fff8fd; border: 2px solid #f3c9ff; }

    .token-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }

    .token {
      background: white;
      border: 2px solid #ffc9df;
      color: var(--pink4);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: 0.2s;
    }

    .token:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(255, 159, 200, 0.3); }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: none; border-radius: 999px; padding: 12px 20px;
      font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .btn.primary { background: var(--pink3); color: white; }
    .btn.soft { background: white; color: var(--pink4); border: 2px solid var(--pink1); }
    .btn:active { transform: scale(0.95); }

    .result { margin-top: 14px; padding: 14px; border-radius: 20px; font-weight: 800; }
    .result.correct { background: var(--mint); color: #2f8d57; border: 2px solid #bcefd0; }
    .result.wrong { background: var(--rose); color: #d05b7c; border: 2px solid #ffc6d2; }

    .progress-bar { width: 100%; height: 10px; background: #ffe7f1; border-radius: 999px; overflow: hidden; margin: 10px 0; }
    .progress-fill { height: 100%; background: var(--pink3); width: 0%; transition: 0.3s; }

    .wrong-item, .all-item {
      background: #fff8fb; border: 2px solid #ffd6e7; border-radius: 18px;
      padding: 12px; margin-bottom: 10px;
    }

    .input, .textarea {
      width: 100%; border: 2px solid #ffd6e7; border-radius: 14px;
      padding: 10px; margin-bottom: 8px; outline: none;
    }

    @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>🎀 일본어 문장 조각 맞추기</h1>
      <p class="sub">문장을 조사 단위로 쪼개서 배치해봐! 정답엔 꼭 마침표(。)가 포함되어야 해 ✨</p>
    </section>

    <div class="tabs" id="categoryTabs"></div>

    <div class="layout">
      <main class="card">
        <div class="title-row">
          <div style="font-weight:800; color:var(--pink4);">🌟 문제</div>
          <div id="cardCounter" style="font-weight:bold;">1 / 1</div>
        </div>

        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

        <div class="meaning-box">
          <div style="font-size:12px; color:var(--pink4); margin-bottom:5px;">해석</div>
          <div class="meaning-text" id="meaningText"></div>
        </div>

        <div class="answer-box">
          <div style="font-size:12px; color:var(--pink4); margin-bottom:5px;">내 문장</div>
          <div class="token-row" id="answerRow"></div>
        </div>

        <div class="bank-box">
          <div style="font-size:12px; color:var(--pink4); margin-bottom:5px;">단어 조각 (랜덤)</div>
          <div class="token-row" id="bankRow"></div>
        </div>

        <div class="btn-row">
          <button class="btn primary" id="checkBtn">제출하기</button>
          <button class="btn soft" id="resetBtn">초기화</button>
          <button class="btn soft" id="prevBtn">이전</button>
          <button class="btn soft" id="nextBtn">다음</button>
        </div>
        <div id="resultBox"></div>
      </main>

      <aside>
        <section class="card" style="margin-bottom:18px;">
          <h3 style="margin:0 0 10px; color:var(--pink4);">💗 오답노트</h3>
          <div id="wrongList" style="max-height:300px; overflow-y:auto;"></div>
        </section>

        <section class="card">
          <h3 style="margin:0 0 10px; color:var(--pink4);">➕ 카드 추가</h3>
          <input class="input" id="newKo" placeholder="한국어 해석">
          <textarea class="textarea" id="newJp" placeholder="일본어 문장 (마침표 포함)"></textarea>
          <button class="btn primary" style="width:100%" id="addBtn">추가하기</button>
        </section>
      </aside>
    </div>
  </div>

  <script>
    const seedDeck = {
      "1과": [
        { ko: "3kg나 살이 쪄버렸습니다.", jp: "３キロも太ってしまいました。" },
        { ko: "일본 드라마를 보고 있습니다.", jp: "日本のドラマを見ています。" },
        { ko: "아침에 일어나서, 어머니께 메일을 보냈습니다.", jp: "朝起きて부터、母にメールを送りました。" }
      ],
      "2과": [
        { ko: "다 같이 춤추기도 하고 불꽃놀이를 보기도 합니다.", jp: "みんなで踊ったり花火を見たりします。" },
        { ko: "왼쪽으로 돌면 꽃집이 있습니다.", jp: "左に曲がると花屋があります。" }
      ]
    };

    let currentCategory = "1과";
    let currentIndex = 0;
    let bank = [];
    let answer = [];
    let wrongNotes = JSON.parse(localStorage.getItem("jp_wrong_notes") || "[]");
    let extraDeck = JSON.parse(localStorage.getItem("jp_extra_deck") || "{}");

    // 문장을 조사와 단어로 쪼개는 함수
    function splitJp(sentence) {
      const text = sentence.replace(/[。？！]/g, "").trim();
      const particles = ["から", "まで", "より", "だけ", "しか", "など", "ので", "のに", "でも", "は", "가", "を", "に", "へ", "で", "と", "も", "야", "の", "ね", "よ", "か", "な", "たり", "たら", "れば"];
      
      let tokens = [];
      let i = 0;
      while (i < text.length) {
        let found = false;
        for (let len = 2; len >= 1; len--) {
          let part = text.substring(i, i + len);
          if (particles.includes(part)) {
            tokens.push(part);
            i += len;
            found = true;
            break;
          }
        }
        if (!found) {
          let nextP = text.length;
          particles.forEach(p => {
            let pos = text.indexOf(p, i);
            if (pos !== -1 && pos < nextP) nextP = pos;
          });
          tokens.push(text.substring(i, nextP));
          i = nextP;
        }
      }
      return tokens.filter(t => t.length > 0);
    }

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function getFullDeck() {
      const d = {...seedDeck};
      for(let k in extraDeck) d[k] = (d[k] || []).concat(extraDeck[k]);
      return d;
    }

    function render() {
      const deck = getFullDeck();
      const list = deck[currentCategory] || [];
      const card = list[currentIndex];

      // 카테고리 탭
      const tabs = document.getElementById("categoryTabs");
      tabs.innerHTML = "";
      Object.keys(deck).forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (cat === currentCategory ? " active" : "");
        btn.innerText = cat;
        btn.onclick = () => { currentCategory = cat; currentIndex = 0; initCard(); };
        tabs.appendChild(btn);
      });

      if (!card) return;

      document.getElementById("cardCounter").innerText = `${currentIndex + 1} / ${list.length}`;
      document.getElementById("meaningText").innerText = card.ko;
      document.getElementById("progressFill").style.width = `${((currentIndex + 1) / list.length) * 100}%`;

      // 정답 영역
      const aRow = document.getElementById("answerRow");
      aRow.innerHTML = "";
      answer.forEach((t, i) => {
        const span = document.createElement("span");
        span.className = "token";
        span.innerText = t;
        span.onclick = () => { bank.push(answer.splice(i, 1)[0]); render(); };
        aRow.appendChild(span);
      });

      // 보기 영역
      const bRow = document.getElementById("bankRow");
      bRow.innerHTML = "";
      bank.forEach((t, i) => {
        const span = document.createElement("span");
        span.className = "token";
        span.innerText = t;
        span.onclick = () => { answer.push(bank.splice(i, 1)[0]); render(); };
        bRow.appendChild(span);
      });

      renderWrongNotes();
    }

    function initCard() {
      const deck = getFullDeck();
      const card = deck[currentCategory][currentIndex];
      if (card) {
        bank = shuffle(splitJp(card.jp));
        answer = [];
        document.getElementById("resultBox").innerHTML = "";
      }
      render();
    }

    function renderWrongNotes() {
      const box = document.getElementById("wrongList");
      box.innerHTML = wrongNotes.length ? "" : "<div style='color:#ad7c95; font-size:13px;'>깨끗해요! 🫧</div>";
      wrongNotes.forEach((n, i) => {
        const div = document.createElement("div");
        div.className = "wrong-item";
        div.innerHTML = `<strong>${n.ko}</strong><br><small style="color:var(--pink4)">정답: ${n.jp}</small>`;
        box.appendChild(div);
      });
    }

    document.getElementById("checkBtn").onclick = () => {
      const card = getFullDeck()[currentCategory][currentIndex];
      const userJp = answer.join("") + "。";
      if (userJp === card.jp) {
        document.getElementById("resultBox").innerHTML = "<div class='result correct'>정답이야! 멋져 태윤아! 🌟</div>";
      } else {
        document.getElementById("resultBox").innerHTML = `<div class='result wrong'>틀렸어! 정답: ${card.jp}</div>`;
        if (!wrongNotes.find(n => n.jp === card.jp)) {
          wrongNotes.unshift(card);
          localStorage.setItem("jp_wrong_notes", JSON.stringify(wrongNotes));
          renderWrongNotes();
        }
      }
    };

    document.getElementById("resetBtn").onclick = initCard;
    document.getElementById("prevBtn").onclick = () => { if (currentIndex > 0) { currentIndex--; initCard(); } };
    document.getElementById("nextBtn").onclick = () => {
      const list = getFullDeck()[currentCategory];
      if (currentIndex < list.length - 1) { currentIndex++; initCard(); }
    };

    document.getElementById("addBtn").onclick = () => {
      const ko = document.getElementById("newKo").value;
      const jp = document.getElementById("newJp").value;
      if (!ko || !jp) return alert("내용을 입력해줘!");
      if (!extraDeck["추가 문장"]) extraDeck["추가 문장"] = [];
      extraDeck["추가 문장"].push({ ko, jp: jp.endsWith("。") ? jp : jp + "。" });
      localStorage.setItem("jp_extra_deck", JSON.stringify(extraDeck));
      currentCategory = "추가 문장";
      currentIndex = extraDeck["추가 문장"].length - 1;
      document.getElementById("newKo").value = "";
      document.getElementById("newJp").value = "";
      initCard();
    };

    initCard();
  </script>
</body>
</html>
